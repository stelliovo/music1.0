<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐术语记忆大师 - 终极完整版</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-sub: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; }
        .header h1 { font-size: 1.2rem; color: var(--primary-color); }
        .content {
            flex: 1; padding: 20px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .hidden { display: none !important; }

        /* 按钮样式 */
        .btn {
            border: none; padding: 15px; border-radius: 12px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary-color); color: white; width: 100%; margin-bottom: 10px;}
        .btn-outline { background: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); width: 100%; margin-bottom: 10px;}
        .btn-success { background: var(--success-color); color: white; flex: 1; }
        .btn-danger { background: var(--danger-color); color: white; flex: 1; }
        
        .category-btn {
            background: #f8fafc; border: 2px solid #e2e8f0; color: var(--text-main);
            width: 100%; margin-bottom: 10px;
        }
        .category-btn.active { border-color: var(--primary-color); background: #eef2ff; color: var(--primary-color); }

        /* 卡片样式 */
        .flashcard { width: 100%; height: 300px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .card-inner {
            position: relative; width: 100%; height: 100%; text-align: center;
            transition: transform 0.6s; transform-style: preserve-3d;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 16px;
        }
        .flashcard.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 16px; background: white; padding: 20px;
        }
        .card-front { border: 2px solid var(--primary-color); }
        .card-back { background: var(--primary-color); color: white; transform: rotateY(180deg); }

        .term-text { font-size: 2rem; font-weight: bold; margin-bottom: 10px; }
        .abbr-text { font-size: 1.2rem; opacity: 0.8; font-style: italic; }
        .meaning-text { font-size: 1.8rem; font-weight: bold; }

        /* 进度条与激励语 */
        .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success-color); width: 0%; transition: width 0.3s; }
        .motivation-toast {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white; padding: 8px 16px;
            border-radius: 20px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 10; white-space: nowrap;
        }
        .controls { display: flex; gap: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>🎵 音乐术语记忆大师</h1></div>
    <div id="motivationToast" class="motivation-toast">贝多芬为你鼓掌！</div>

    <!-- 页面1：主页 -->
    <div id="page-home" class="content">
        <p style="margin-bottom: 15px; color: #666;">请选择背诵范围：</p>
        <button class="btn category-btn active" onclick="setMode('all', this)">📚 全部通关</button>
        <button class="btn category-btn" onclick="setMode('top', this)">⬆️ 上半部分 (速度/力度)</button>
        <button class="btn category-btn" onclick="setMode('bottom', this)">⬇️ 下半部分 (表情/演奏)</button>
        <div style="margin-top: 10px; width: 100%;">
             <button class="btn btn-primary" onclick="startStudy()">🚀 开始学习</button>
        </div>
        <div style="margin-top:15px; font-size:0.9rem; color:#999;">当前错题本：<span id="error-count">0</span> 个</div>
    </div>

    <!-- 页面2：学习界面 -->
    <div id="page-study" class="content hidden">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div class="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <div id="card-term" class="term-text">Term</div>
                    <div id="card-abbr" class="abbr-text"></div>
                    <div style="margin-top:20px; font-size: 0.8rem; color:#999;">点击翻转查看含义</div>
                </div>
                <div class="card-back">
                    <div id="card-meaning" class="meaning-text">Meaning</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <button class="btn btn-danger" onclick="handleResult(false)">❌ 不认识</button>
            <button class="btn btn-success" onclick="handleResult(true)">✅ 认识</button>
        </div>
        <div style="margin-top: 15px;">
            <button class="btn btn-outline" style="padding: 8px 20px; font-size: 0.9rem;" onclick="goHome()">🏠 返回主页</button>
        </div>
    </div>

    <!-- 页面3：结算界面 -->
    <div id="page-result" class="content hidden">
        <h2 style="color: var(--primary-color); margin-bottom: 20px;">🎉 本轮完成！</h2>
        <p id="result-msg" style="margin-bottom: 30px; color: #666;"></p>
        <button class="btn btn-primary" onclick="retryWrong()">🔄 只练错题</button>
        <button class="btn btn-outline" onclick="goHome()">🏠 返回主页</button>
    </div>
</div>

        { t: "Legato", m: "连奏", c: "bottom" },

    function showToast(type) {

    function shuffleArray(arr) {

            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    // 开始学习
    function startStudy() {
        let sourceData = [];
        if (currentMode === 'all') sourceData = [...rawData];

        ui.card.classList.remove('flipped');

        const percent = (passedCount / totalInRound) * 100;
        ui.progress.style.width = `${percent}%`;
    }

        ui.card.classList.toggle('flipped');
        if (isFlipped) showToast('flip');
    }
